<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | Vixelry</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="auth.css">
</head>
<body>
  <main class="auth-shell">
    <section class="auth-brand-panel">
      <a href="index.html"><img class="auth-logo" src="images/vixelry-logo.png" alt="Vixelry Digital Marketing Agency"></a>
      <div>
        <h1>Set a new password.</h1>
        <p>Use your reset token link to update account access.</p>
      </div>
    </section>
    <section class="auth-card-wrap">
      <form class="auth-card" data-reset-form>
        <h2>Reset Password</h2>
        <p>If you opened a reset link, the token is already included.</p>
        <div class="form-grid">
          <div class="field">
            <label for="token">Reset token</label>
            <input id="token" name="token" type="text" placeholder="Paste token if needed">
          </div>
          <div class="field">
            <label for="password">New password</label>
            <input id="password" name="password" type="password" minlength="8" autocomplete="new-password" required>
          </div>
          <button class="auth-button" type="submit">Update Password</button>
        </div>
        <div class="auth-message" data-auth-message></div>
        <div class="auth-row"><a href="login.html">Back to login</a></div>
      </form>
    </section>
  </main>
  <script src="config.js"></script>
  <script src="auth.js"></script>
</body>
</html>
