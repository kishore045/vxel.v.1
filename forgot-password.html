<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password | Vixelry</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="auth.css">
</head>
<body>
  <main class="auth-shell">
    <section class="auth-brand-panel">
      <a href="index.html"><img class="auth-logo" src="images/vixelry-logo.png" alt="Vixelry Digital Marketing Agency"></a>
      <div>
        <h1>Reset access securely.</h1>
        <p>Generate a password reset link for your Vixelry dashboard account.</p>
      </div>
    </section>
    <section class="auth-card-wrap">
      <form class="auth-card" data-forgot-form>
        <h2>Forgot Password</h2>
        <p>Enter the email linked to your account.</p>
        <div class="form-grid">
          <div class="field">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" autocomplete="email" required>
          </div>
          <button class="auth-button" type="submit">Generate Reset Link</button>
        </div>
        <div class="auth-message" data-auth-message></div>
        <div class="auth-row"><a href="login.html">Back to login</a></div>
      </form>
    </section>
  </main>
  <script src="config.js"></script>
  <script src="auth.js"></script>
</body>
</html>
