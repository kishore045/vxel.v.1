<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Vixelry</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="auth.css">
</head>
<body data-auth-page="login">
  <main class="auth-shell">
    <section class="auth-brand-panel">
      <a href="index.html"><img class="auth-logo" src="images/vixelry-logo.png" alt="Vixelry Digital Marketing Agency"></a>
      <div>
        <h1>Vixelry Agency OS.</h1>
        <p>A secure CRM workspace for client projects, leads, reports, invoices, support, meetings, analytics, and agency operations.</p>
      </div>
    </section>
    <section class="auth-card-wrap">
      <form class="auth-card" data-login-form>
        <h2>Login</h2>
        <p>Enter your account details to continue.</p>
        <div class="form-grid">
          <div class="field">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" autocomplete="email" required>
          </div>
          <div class="field">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required>
          </div>
          <button class="auth-button" type="submit">Login</button>
        </div>
        <div class="auth-message" data-auth-message></div>
        <div class="auth-row">
          <a href="forgot-password.html">Forgot password?</a>
          <span>New here? <a href="register.html">Create account</a></span>
        </div>
      </form>
    </section>
  </main>
  <script src="config.js?v=2"></script>
  <script src="auth.js?v=2"></script>
</body>
</html>
